name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to production
        run: |
          echo "Deploying tag ${{ github.ref_name }} to PRODUCTION"
          echo "This is the authoritative production deploy. Main reflects exact production state."
          echo "Approved by: business sign-off (reference PR), legal sign-off (reference)"
